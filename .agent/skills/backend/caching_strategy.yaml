# SKILL: Caching Strategy
# ════════════════════════════════════════════════════════════════════════════

name: "Caching Strategy"
version: "1.0"
agent: "backend"

trigger_keywords:
  - "cache"
  - "redis"
  - "performance"
  - "yavaş"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  simple_cache:
    description: "In-memory cache (geliştirme)"
    code: |
      from functools import lru_cache

      @lru_cache(maxsize=100)
      def get_config_value(key: str) -> str:
          # Expensive operation
          return db.query(Config).filter(Config.key == key).first().value

  redis_cache:
    description: "Redis cache pattern"
    code: |
      import redis.asyncio as redis
      import json

      redis_client = redis.from_url("redis://localhost:6379")

      async def get_cached_data(key: str, ttl: int = 300):
          # Try cache first
          cached = await redis_client.get(key)
          if cached:
              return json.loads(cached)
          
          # Fetch fresh data
          data = await fetch_from_db(key)
          
          # Store in cache
          await redis_client.setex(key, ttl, json.dumps(data))
          return data

  cache_decorator:
    description: "Async cache decorator"
    code: |
      def cached(ttl: int = 300, prefix: str = ""):
          def decorator(func):
              @wraps(func)
              async def wrapper(*args, **kwargs):
                  cache_key = f"{prefix}:{func.__name__}:{args}:{kwargs}"
                  
                  cached = await redis_client.get(cache_key)
                  if cached:
                      return json.loads(cached)
                  
                  result = await func(*args, **kwargs)
                  await redis_client.setex(cache_key, ttl, json.dumps(result))
                  return result
              return wrapper
          return decorator

      # Kullanım
      @cached(ttl=600, prefix="dashboard")
      async def get_dashboard_stats():
          ...

  cache_invalidation:
    description: "Cache invalidation"
    code: |
      async def invalidate_cache(pattern: str):
          """İlgili cache key'lerini sil"""
          keys = await redis_client.keys(pattern)
          if keys:
              await redis_client.delete(*keys)

      # Örnek: Araç güncellendiğinde
      async def update_vehicle(vehicle_id: int, data):
          result = await repo.update(vehicle_id, data)
          await invalidate_cache(f"vehicle:{vehicle_id}:*")
          await invalidate_cache("dashboard:*")  # Dashboard'u da invalidate
          return result

# ════════════════════════════════════════════════════════════════════════════
cache_strategies:
  cache_aside:
    description: "Uygulama cache'i yönetir"
    pattern: "Read: Cache → Miss → DB → Cache Write"

  write_through:
    description: "Her yazma cache + DB'yi günceller"
    pattern: "Write: Cache + DB simultaneously"

  write_behind:
    description: "Önce cache, sonra async DB"
    pattern: "Write: Cache → Async DB write"

# ════════════════════════════════════════════════════════════════════════════
what_to_cache:
  good_candidates:
    - "Dashboard stats (değişim yavaş)"
    - "User session/profile"
    - "Config değerleri"
    - "Sık sorgulanan referans data"

  avoid_caching:
    - "Gerçek zamanlı veri (lokasyon, sensör)"
    - "Hassas kişisel veri"
    - "Sık değişen veri"

ttl_guidelines:
  short_5_min: "Dashboard stats, sık değişen"
  medium_1_hour: "User profile, referans data"
  long_24_hour: "Config, static content"

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Cache key'leri tutarlı ve anlamlı"
  - "TTL her zaman belirle"
  - "Cache miss durumunu handle et"
  - "Invalidation stratejisi planla"
  - "Cache poisoning'e dikkat"
  - "Cache stampede için locking"
