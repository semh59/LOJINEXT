# ════════════════════════════════════════════════════════════════════════════
# SKILL: Dependency Injection (Container Pattern)
# ════════════════════════════════════════════════════════════════════════════

name: "Dependency Injection"
version: "1.0"
agent: "backend"

trigger_keywords:
  - "dependency"
  - "container"
  - "inject"
  - "service"

# ════════════════════════════════════════════════════════════════════════════
project_context:
  container_file: "app/core/container.py"
  pattern: "Dependency Injector library"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  basic_container:
    description: "Container tanımı"
    code: |
      from dependency_injector import containers, providers

      class Container(containers.DeclarativeContainer):
          config = providers.Configuration()
          
          # Database
          db_session = providers.Resource(
              get_async_session,
              database_url=config.database_url
          )
          
          # Repositories
          user_repository = providers.Factory(
              UserRepository,
              session=db_session
          )
          
          # Services
          user_service = providers.Factory(
              UserService,
              user_repo=user_repository
          )

  wiring:
    description: "Container wiring"
    code: |
      # main.py
      container = Container()
      container.config.database_url.from_env("DATABASE_URL")
      container.wire(modules=[
          "app.api.v1.endpoints.users",
          "app.api.v1.endpoints.vehicles"
      ])

  endpoint_injection:
    description: "Endpoint'te injection"
    code: |
      from dependency_injector.wiring import inject, Provide

      @router.get("/users/{user_id}")
      @inject
      async def get_user(
          user_id: int,
          user_service: UserService = Depends(Provide[Container.user_service])
      ):
          return await user_service.get_by_id(user_id)

  fastapi_depends:
    description: "FastAPI native Depends"
    code: |
      # Basit dependency
      async def get_db():
          async with async_session() as session:
              yield session

      async def get_current_user(
          token: str = Depends(oauth2_scheme),
          db: AsyncSession = Depends(get_db)
      ):
          user = await verify_token(token, db)
          if not user:
              raise HTTPException(401, "Invalid token")
          return user

      # Kullanım
      @router.get("/me")
      async def get_me(user: User = Depends(get_current_user)):
          return user

  scoped_dependencies:
    description: "Request-scoped vs singleton"
    code: |
      class Container(containers.DeclarativeContainer):
          # Singleton - tek instance
          config_service = providers.Singleton(ConfigService)
          
          # Factory - her çağrıda yeni instance
          report_generator = providers.Factory(ReportGenerator)
          
          # Resource - lifecycle managed (db connection)
          db_session = providers.Resource(create_session)

# ════════════════════════════════════════════════════════════════════════════
testing:
  mock_injection: |
    # Test'te dependency override
    def test_get_user(client):
        mock_service = Mock(spec=UserService)
        mock_service.get_by_id.return_value = fake_user
        
        with container.user_service.override(mock_service):
            response = client.get("/users/1")
            assert response.status_code == 200

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Service'ler stateless olsun"
  - "Repository DB erişimi, Service business logic"
  - "Test için kolay mock/override"
  - "Circular dependency'den kaçın"
  - "Config değerlerini inject et, hardcode yapma"
