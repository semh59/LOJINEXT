name: "Async Patterns"
version: "1.0"
agent: "backend"

trigger_keywords:
  - "async"
  - "await"
  - "concurrent"
  - "parallel"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  basic_async_function:
    description: "Temel async fonksiyon"
    code: |
      async def get_user_by_id(db: AsyncSession, user_id: int) -> User | None:
          result = await db.execute(
              select(User).where(User.id == user_id)
          )
          return result.scalar_one_or_none()

  async_context_manager:
    description: "Async context manager"
    code: |
      async with async_session() as session:
          async with session.begin():
              # transaction içinde işlemler
              await session.execute(...)

  parallel_execution:
    description: "Paralel async çağrılar"
    code: |
      import asyncio

      async def fetch_all_data(user_id: int):
          # Paralel çalıştır
          user_task = asyncio.create_task(get_user(user_id))
          trips_task = asyncio.create_task(get_user_trips(user_id))
          stats_task = asyncio.create_task(get_user_stats(user_id))
          
          user, trips, stats = await asyncio.gather(
              user_task, trips_task, stats_task
          )
          return {"user": user, "trips": trips, "stats": stats}

  async_generator:
    description: "Async generator (streaming)"
    code: |
      async def stream_large_data(query):
          result = await db.stream(query)
          async for row in result:
              yield row

  retry_pattern:
    description: "Retry with exponential backoff"
    code: |
      import asyncio
      from tenacity import retry, stop_after_attempt, wait_exponential

      @retry(
          stop=stop_after_attempt(3),
          wait=wait_exponential(multiplier=1, min=1, max=10)
      )
      async def call_external_api(url: str):
          async with httpx.AsyncClient() as client:
              response = await client.get(url, timeout=10.0)
              response.raise_for_status()
              return response.json()

  semaphore_rate_limit:
    description: "Concurrent request limiting"
    code: |
      import asyncio

      semaphore = asyncio.Semaphore(10)  # Max 10 concurrent

      async def limited_request(url: str):
          async with semaphore:
              return await make_request(url)

      results = await asyncio.gather(*[
          limited_request(url) for url in urls
      ])

# ════════════════════════════════════════════════════════════════════════════
common_mistakes:
  blocking_in_async:
    problem: "Async içinde blocking call"
    bad: "time.sleep(1)"
    good: "await asyncio.sleep(1)"

  sync_db_in_async:
    problem: "Sync SQLAlchemy async endpoint'te"
    solution: "AsyncSession ve async_scoped_session kullan"

  missing_await:
    problem: "await unutmak"
    symptom: "coroutine was never awaited"
    solution: "Tüm async fonksiyonları await et"

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "I/O-bound işlemler için async kullan"
  - "CPU-bound için ProcessPoolExecutor"
  - "Paralel bağımsız işlemler için asyncio.gather"
  - "Rate limiting için Semaphore"
  - "Timeout her zaman ayarla"
  - "Retry mekanizması ekle (external API)"
