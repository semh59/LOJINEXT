# ════════════════════════════════════════════════════════════════════════════
# SKILL: TanStack Query Patterns
# ════════════════════════════════════════════════════════════════════════════
# Server state management with TanStack Query

name: "TanStack Query"
version: "1.0"
agent: "frontend"

trigger_keywords:
  - "tanstack"
  - "react query"
  - "useQuery"
  - "useMutation"
  - "api call"
  - "fetch"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  list_query:
    description: "Liste getirme"
    code: |
      export function use{Entity}s(filters?: Filters) {
        return useQuery({
          queryKey: ['{entity}s', filters],
          queryFn: () => {entity}Service.getAll(filters),
          staleTime: 5 * 60 * 1000,
        });
      }

  single_query:
    description: "Tekil kayıt getirme"
    code: |
      export function use{Entity}(id: number | undefined) {
        return useQuery({
          queryKey: ['{entity}', id],
          queryFn: () => {entity}Service.getById(id!),
          enabled: !!id,
        });
      }

  create_mutation:
    description: "Kayıt oluşturma"
    code: |
      export function useCreate{Entity}() {
        const queryClient = useQueryClient();
        
        return useMutation({
          mutationFn: (data: Create{Entity}Input) => 
            {entity}Service.create(data),
          onSuccess: () => {
            queryClient.invalidateQueries({ queryKey: ['{entity}s'] });
            toast.success('{Entity} oluşturuldu');
          },
          onError: (error: ApiError) => {
            toast.error(error.message);
          },
        });
      }

  update_mutation:
    description: "Kayıt güncelleme"
    code: |
      export function useUpdate{Entity}() {
        const queryClient = useQueryClient();
        
        return useMutation({
          mutationFn: ({ id, data }: { id: number; data: Update{Entity}Input }) =>
            {entity}Service.update(id, data),
          onSuccess: (_, { id }) => {
            queryClient.invalidateQueries({ queryKey: ['{entity}s'] });
            queryClient.invalidateQueries({ queryKey: ['{entity}', id] });
            toast.success('Güncellendi');
          },
        });
      }

  delete_mutation:
    description: "Kayıt silme"
    code: |
      export function useDelete{Entity}() {
        const queryClient = useQueryClient();
        
        return useMutation({
          mutationFn: (id: number) => {entity}Service.delete(id),
          onSuccess: () => {
            queryClient.invalidateQueries({ queryKey: ['{entity}s'] });
            toast.success('Silindi');
          },
        });
      }

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "queryKey'leri tutarlı kullan"
  - "staleTime'ı data freshness'a göre ayarla"
  - "enabled ile conditional fetch yap"
  - "onSuccess'te invalidation yap"
  - "onError'da user-friendly mesaj göster"

# ════════════════════════════════════════════════════════════════════════════
common_pitfalls:
  - problem: "Sonsuz refetch loop"
    solution: "staleTime ve refetchOnWindowFocus kontrol et"

  - problem: "Stale data görünüyor"
    solution: "invalidateQueries doğru queryKey ile çağır"

  - problem: "Query çalışmıyor"
    solution: "enabled prop kontrolü"
