name: "Loading States"
version: "1.0"
agent: "frontend"

trigger_keywords:
  - "loading"
  - "skeleton"
  - "spinner"
  - "yükleniyor"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  spinner:
    description: "Temel spinner"
    code: |
      interface SpinnerProps {
        size?: 'sm' | 'md' | 'lg';
        className?: string;
      }

      export function Spinner({ size = 'md', className }: SpinnerProps) {
        const sizeClasses = {
          sm: 'w-4 h-4',
          md: 'w-6 h-6',
          lg: 'w-8 h-8',
        };
        
        return (
          <svg
            className={clsx("animate-spin text-blue-600", sizeClasses[size], className)}
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              className="opacity-25"
              cx="12" cy="12" r="10"
              stroke="currentColor"
              strokeWidth="4"
            />
            <path
              className="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
        );
      }

  skeleton:
    description: "Skeleton loader"
    code: |
      interface SkeletonProps {
        className?: string;
        variant?: 'text' | 'circular' | 'rectangular';
      }

      export function Skeleton({ className, variant = 'text' }: SkeletonProps) {
        const variantClasses = {
          text: 'h-4 rounded',
          circular: 'rounded-full',
          rectangular: 'rounded-md',
        };
        
        return (
          <div
            className={clsx(
              "animate-pulse bg-gray-200",
              variantClasses[variant],
              className
            )}
          />
        );
      }

      // Kullanım
      <Skeleton className="w-32 h-4" />
      <Skeleton variant="circular" className="w-10 h-10" />

  table_skeleton:
    description: "Tablo skeleton"
    code: |
      interface TableSkeletonProps {
        rows?: number;
        cols?: number;
      }

      export function TableSkeleton({ rows = 5, cols = 4 }: TableSkeletonProps) {
        return (
          <div className="space-y-3">
            {/* Header */}
            <div className="flex gap-4 p-4 bg-gray-100">
              {Array.from({ length: cols }).map((_, i) => (
                <Skeleton key={i} className="flex-1 h-4" />
              ))}
            </div>
            
            {/* Rows */}
            {Array.from({ length: rows }).map((_, row) => (
              <div key={row} className="flex gap-4 p-4 border-b">
                {Array.from({ length: cols }).map((_, col) => (
                  <Skeleton key={col} className="flex-1 h-4" />
                ))}
              </div>
            ))}
          </div>
        );
      }

  card_skeleton:
    description: "Card skeleton"
    code: |
      export function CardSkeleton() {
        return (
          <div className="p-4 border rounded-lg space-y-4">
            <div className="flex items-center gap-3">
              <Skeleton variant="circular" className="w-10 h-10" />
              <div className="flex-1 space-y-2">
                <Skeleton className="w-3/4 h-4" />
                <Skeleton className="w-1/2 h-3" />
              </div>
            </div>
            <Skeleton className="w-full h-24" variant="rectangular" />
            <div className="flex gap-2">
              <Skeleton className="w-20 h-8" variant="rectangular" />
              <Skeleton className="w-20 h-8" variant="rectangular" />
            </div>
          </div>
        );
      }

  loading_overlay:
    description: "Full page loading overlay"
    code: |
      export function LoadingOverlay({ message = "Yükleniyor..." }: { message?: string }) {
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/80">
            <div className="flex flex-col items-center gap-4">
              <Spinner size="lg" />
              <p className="text-gray-600">{message}</p>
            </div>
          </div>
        );
      }

  button_loading:
    description: "Button loading state"
    code: |
      interface ButtonProps {
        isLoading?: boolean;
        children: React.ReactNode;
        // ... other props
      }

      export function Button({ isLoading, children, disabled, ...props }: ButtonProps) {
        return (
          <button disabled={disabled || isLoading} {...props}>
            {isLoading ? (
              <>
                <Spinner size="sm" className="mr-2" />
                Yükleniyor...
              </>
            ) : children}
          </button>
        );
      }

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Skeleton, içerik layout'unu taklit etmeli"
  - "Küçük işlemler için spinner, sayfa için skeleton"
  - "Button disable + spinner combo"
  - "Minimum loading süresi (UX için)"
  - "Loading message contextual olsun"
