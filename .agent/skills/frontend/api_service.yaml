# ════════════════════════════════════════════════════════════════════════════
# SKILL: API Service Pattern
# ════════════════════════════════════════════════════════════════════════════

name: "API Service"
version: "1.0"
agent: "frontend"

trigger_keywords:
  - "api"
  - "service"
  - "axios"
  - "fetch"
  - "http"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  api_client:
    description: "Base API client"
    code: |
      import axios, { AxiosError, AxiosRequestConfig } from 'axios';

      export const apiClient = axios.create({
        baseURL: import.meta.env.VITE_API_URL || '/api/v1',
        timeout: 10000,
        headers: {
          'Content-Type': 'application/json',
        },
      });

      // Request interceptor - Auth token
      apiClient.interceptors.request.use((config) => {
        const token = localStorage.getItem('access_token');
        if (token) {
          config.headers.Authorization = `Bearer ${token}`;
        }
        return config;
      });

      // Response interceptor - Error handling
      apiClient.interceptors.response.use(
        (response) => response,
        async (error: AxiosError) => {
          if (error.response?.status === 401) {
            // Token expired, redirect to login
            localStorage.removeItem('access_token');
            window.location.href = '/login';
          }
          return Promise.reject(error);
        }
      );

  service_module:
    description: "Entity service module"
    code: |
      import { apiClient } from '@/lib/api';
      import { Driver, CreateDriverInput, UpdateDriverInput } from '@/types';

      export const driverService = {
        getAll: async (params?: { search?: string; page?: number }) => {
          const { data } = await apiClient.get<Driver[]>('/suruculer', { params });
          return data;
        },
        
        getById: async (id: number) => {
          const { data } = await apiClient.get<Driver>(`/suruculer/${id}`);
          return data;
        },
        
        create: async (input: CreateDriverInput) => {
          const { data } = await apiClient.post<Driver>('/suruculer', input);
          return data;
        },
        
        update: async (id: number, input: UpdateDriverInput) => {
          const { data } = await apiClient.put<Driver>(`/suruculer/${id}`, input);
          return data;
        },
        
        delete: async (id: number) => {
          await apiClient.delete(`/suruculer/${id}`);
        },
      };

  type_definitions:
    description: "API type definitions"
    code: |
      // types/driver.ts
      export interface Driver {
        id: number;
        ad: string;
        soyad: string;
        telefon: string;
        is_active: boolean;
        created_at: string;
      }

      export interface CreateDriverInput {
        ad: string;
        soyad: string;
        telefon: string;
      }

      export interface UpdateDriverInput {
        ad?: string;
        soyad?: string;
        telefon?: string;
      }

      // API response types
      export interface PaginatedResponse<T> {
        items: T[];
        total: number;
        page: number;
        page_size: number;
      }

      export interface ApiError {
        detail: string;
        code?: string;
      }

  error_handling:
    description: "API error handling"
    code: |
      export class ApiError extends Error {
        constructor(
          message: string,
          public statusCode: number,
          public code?: string
        ) {
          super(message);
          this.name = 'ApiError';
        }
      }

      export function handleApiError(error: unknown): never {
        if (axios.isAxiosError(error)) {
          const message = error.response?.data?.detail || error.message;
          throw new ApiError(message, error.response?.status || 500);
        }
        throw error;
      }

      // Service'te kullanım
      export const driverService = {
        getById: async (id: number) => {
          try {
            const { data } = await apiClient.get<Driver>(`/suruculer/${id}`);
            return data;
          } catch (error) {
            handleApiError(error);
          }
        },
      };

# ════════════════════════════════════════════════════════════════════════════
file_structure:
  services: |
    frontend/src/services/
    ├── api.ts          # Base client
    ├── driverService.ts
    ├── vehicleService.ts
    ├── tripService.ts
    └── index.ts        # Re-exports

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Dedicated service per entity"
  - "Type everything (request/response)"
  - "Central error handling"
  - "Interceptors for auth & errors"
  - "Environment-based base URL"
