best_practices:
  - "Generic type kullan <T>"
  - "Loading skeleton göster"
  - "Empty state tasarla"
  - "Hover effect ekle"
  - "Responsive: mobile'da horizontal scroll veya card view"
  - "Keyboard navigation düşün"
