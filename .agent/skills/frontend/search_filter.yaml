name: "Search Filter"
version: "1.0"
agent: "frontend"

trigger_keywords:
  - "search"
  - "filter"
  - "arama"
  - "filtre"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  debounced_search:
    description: "Debounced arama input"
    code: |
      function useDebounce<T>(value: T, delay: number = 300): T {
        const [debouncedValue, setDebouncedValue] = useState(value);
        
        useEffect(() => {
          const timer = setTimeout(() => setDebouncedValue(value), delay);
          return () => clearTimeout(timer);
        }, [value, delay]);
        
        return debouncedValue;
      }

      // Kullanım
      function SearchInput({ onSearch }: { onSearch: (q: string) => void }) {
        const [query, setQuery] = useState('');
        const debouncedQuery = useDebounce(query, 300);
        
        useEffect(() => {
          onSearch(debouncedQuery);
        }, [debouncedQuery, onSearch]);
        
        return (
          <div className="relative">
            <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
            <input
              type="text"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Ara..."
              className="w-full pl-10 pr-4 py-2 border rounded-lg"
            />
            {query && (
              <button 
                onClick={() => setQuery('')}
                className="absolute right-3 top-1/2 -translate-y-1/2"
              >
                <X className="w-4 h-4 text-gray-400" />
              </button>
            )}
          </div>
        );
      }

  filter_bar:
    description: "Multi-filter bar"
    code: |
      interface Filters {
        search: string;
        status: string;
        dateFrom: string;
        dateTo: string;
      }

      interface FilterBarProps {
        filters: Filters;
        onChange: (filters: Filters) => void;
        onReset: () => void;
      }

      export function FilterBar({ filters, onChange, onReset }: FilterBarProps) {
        const hasActiveFilters = Object.values(filters).some(Boolean);
        
        return (
          <div className="flex flex-wrap gap-4 p-4 bg-gray-50 rounded-lg">
            <SearchInput 
              value={filters.search}
              onChange={(search) => onChange({ ...filters, search })}
            />
            
            <SelectDropdown
              options={statusOptions}
              value={filters.status}
              onChange={(status) => onChange({ ...filters, status })}
              placeholder="Durum"
            />
            
            <DateRangePicker
              from={filters.dateFrom}
              to={filters.dateTo}
              onChange={(dateFrom, dateTo) => onChange({ ...filters, dateFrom, dateTo })}
            />
            
            {hasActiveFilters && (
              <Button variant="ghost" onClick={onReset}>
                <X className="w-4 h-4 mr-1" />
                Temizle
              </Button>
            )}
          </div>
        );
      }

  url_sync_filters:
    description: "URL ile senkronize filtreler"
    code: |
      import { useSearchParams } from 'react-router-dom';

      function useUrlFilters<T extends Record<string, string>>() {
        const [searchParams, setSearchParams] = useSearchParams();
        
        const filters = useMemo(() => {
          const result: Record<string, string> = {};
          searchParams.forEach((value, key) => {
            result[key] = value;
          });
          return result as T;
        }, [searchParams]);
        
        const setFilters = (newFilters: Partial<T>) => {
          const params = new URLSearchParams(searchParams);
          Object.entries(newFilters).forEach(([key, value]) => {
            if (value) params.set(key, value);
            else params.delete(key);
          });
          setSearchParams(params);
        };
        
        const resetFilters = () => setSearchParams({});
        
        return { filters, setFilters, resetFilters };
      }

  active_filter_chips:
    description: "Aktif filtre chip'leri"
    code: |
      interface ActiveFiltersProps {
        filters: Record<string, string>;
        labels: Record<string, string>;
        onRemove: (key: string) => void;
        onClear: () => void;
      }

      export function ActiveFilters({ filters, labels, onRemove, onClear }: ActiveFiltersProps) {
        const activeFilters = Object.entries(filters).filter(([_, v]) => v);
        
        if (!activeFilters.length) return null;
        
        return (
          <div className="flex flex-wrap gap-2">
            {activeFilters.map(([key, value]) => (
              <span 
                key={key}
                className="inline-flex items-center gap-1 px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-sm"
              >
                {labels[key]}: {value}
                <button onClick={() => onRemove(key)}>
                  <X className="w-3 h-3" />
                </button>
              </span>
            ))}
            
            <button 
              onClick={onClear}
              className="text-sm text-gray-600 hover:text-gray-900"
            >
              Tümünü temizle
            </button>
          </div>
        );
      }

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Debounce ile API çağrısını azalt"
  - "URL sync ile sayfa yenileme korunur"
  - "Aktif filtreleri göster (chips)"
  - "Tek tıkla temizle butonu"
  - "Loading state sırasında input disable"
  - "Empty state: 'Sonuç bulunamadı'"
