name: "Logging Patterns"
version: "1.0"
agent: "backend"

trigger_keywords:
  - "log"
  - "logging"
  - "debug"
  - "trace"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  basic_setup:
    description: "Logging configuration"
    code: |
      import logging
      import sys
      from logging.handlers import RotatingFileHandler

      def setup_logging():
          logger = logging.getLogger("lojinext")
          logger.setLevel(logging.INFO)
          
          # Console handler
          console_handler = logging.StreamHandler(sys.stdout)
          console_handler.setLevel(logging.INFO)
          
          # File handler with rotation
          file_handler = RotatingFileHandler(
              "logs/app.log",
              maxBytes=10_000_000,  # 10MB
              backupCount=5
          )
          
          # Format
          formatter = logging.Formatter(
              '%(asctime)s | %(levelname)s | %(name)s | %(message)s'
          )
          console_handler.setFormatter(formatter)
          file_handler.setFormatter(formatter)
          
          logger.addHandler(console_handler)
          logger.addHandler(file_handler)
          
          return logger

  structured_logging:
    description: "JSON structured logging"
    code: |
      import structlog

      structlog.configure(
          processors=[
              structlog.stdlib.add_log_level,
              structlog.processors.TimeStamper(fmt="iso"),
              structlog.processors.JSONRenderer()
          ],
          context_class=dict,
          logger_factory=structlog.stdlib.LoggerFactory(),
      )

      logger = structlog.get_logger()

      # Kullanım
      logger.info(
          "Trip created",
          trip_id=123,
          driver_id=45,
          mesafe_km=500
      )
      # Output: {"event": "Trip created", "trip_id": 123, ...}

  context_logging:
    description: "Request context logging"
    code: |
      from contextvars import ContextVar

      request_id_ctx: ContextVar[str] = ContextVar("request_id", default="")

      @app.middleware("http")
      async def add_request_id(request: Request, call_next):
          request_id = request.headers.get("X-Request-ID", str(uuid4()))
          request_id_ctx.set(request_id)
          
          logger.info("Request started", request_id=request_id, path=request.url.path)
          
          response = await call_next(request)
          
          logger.info("Request completed", request_id=request_id, status=response.status_code)
          return response

  sensitive_data:
    description: "Hassas veri maskeleme"
    code: |
      def mask_sensitive(data: dict) -> dict:
          sensitive_fields = ['password', 'token', 'secret', 'telefon']
          masked = data.copy()
          for key in sensitive_fields:
              if key in masked:
                  masked[key] = "***MASKED***"
          return masked

      # Log'da kullan
      logger.info("User login", user_data=mask_sensitive(user_dict))

# ════════════════════════════════════════════════════════════════════════════
log_levels:
  DEBUG: "Geliştirme detayları, değişken değerleri"
  INFO: "Normal işlem akışı, business events"
  WARNING: "Potansiyel sorun, ama devam edebilir"
  ERROR: "Hata oluştu, işlem başarısız"
  CRITICAL: "Sistem seviyesi kritik hata"

# ════════════════════════════════════════════════════════════════════════════
what_to_log:
  always:
    - "API request/response (timing, status)"
    - "Auth events (login, logout, failed attempts)"
    - "Business critical events (trip created, payment)"
    - "Errors and exceptions"

  development:
    - "SQL queries"
    - "External API calls"
    - "Cache hits/misses"

  never:
    - "Passwords"
    - "API keys/tokens"
    - "Kişisel bilgiler (KVKK)"
    - "Credit card numbers"

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Structured logging (JSON) production'da"
  - "Request ID ile trace"
  - "Log levels doğru kullan"
  - "Sensitive data maskele"
  - "Log rotation ayarla"
  - "Performance: async logging kullan"
