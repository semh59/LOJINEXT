name: "Error Boundary"
version: "1.0"
agent: "frontend"

trigger_keywords:
  - "error"
  - "hata"
  - "boundary"
  - "fallback"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  error_boundary:
    description: "React Error Boundary"
    code: |
      import { Component, ErrorInfo, ReactNode } from 'react';

      interface Props {
        children: ReactNode;
        fallback?: ReactNode;
      }

      interface State {
        hasError: boolean;
        error: Error | null;
      }

      export class ErrorBoundary extends Component<Props, State> {
        constructor(props: Props) {
          super(props);
          this.state = { hasError: false, error: null };
        }
        
        static getDerivedStateFromError(error: Error): State {
          return { hasError: true, error };
        }
        
        componentDidCatch(error: Error, errorInfo: ErrorInfo) {
          console.error('Error caught:', error, errorInfo);
          // Send to error tracking service
        }
        
        render() {
          if (this.state.hasError) {
            return this.props.fallback || <ErrorFallback error={this.state.error} />;
          }
          return this.props.children;
        }
      }

  error_fallback:
    description: "Error fallback component"
    code: |
      interface ErrorFallbackProps {
        error: Error | null;
        resetError?: () => void;
      }

      export function ErrorFallback({ error, resetError }: ErrorFallbackProps) {
        return (
          <div className="flex flex-col items-center justify-center p-8 text-center">
            <AlertTriangle className="w-16 h-16 text-red-500 mb-4" />
            <h2 className="text-xl font-semibold mb-2">Bir hata oluştu</h2>
            <p className="text-gray-600 mb-4">
              {error?.message || 'Beklenmeyen bir hata oluştu'}
            </p>
            {resetError && (
              <Button onClick={resetError}>Tekrar Dene</Button>
            )}
          </div>
        );
      }

  query_error:
    description: "TanStack Query error handling"
    code: |
      function DriverList() {
        const { data, isLoading, error, refetch } = useDrivers();
        
        if (isLoading) return <TableSkeleton />;
        
        if (error) {
          return (
            <div className="p-4 bg-red-50 border border-red-200 rounded-lg">
              <div className="flex items-center gap-2 text-red-800">
                <AlertCircle className="w-5 h-5" />
                <span>Veriler yüklenirken hata oluştu</span>
              </div>
              <Button size="sm" variant="outline" className="mt-2" onClick={() => refetch()}>
                Tekrar Dene
              </Button>
            </div>
          );
        }
        
        return <DataTable data={data} columns={columns} />;
      }

  form_error:
    description: "Form error display"
    code: |
      interface FormErrorProps {
        error: string | undefined;
      }

      export function FormError({ error }: FormErrorProps) {
        if (!error) return null;
        
        return (
          <p className="mt-1 text-sm text-red-600 flex items-center gap-1">
            <AlertCircle className="w-4 h-4" />
            {error}
          </p>
        );
      }

      // Input with error
      export function FormField({ label, error, children }: Props) {
        return (
          <div className="space-y-1">
            <label className="text-sm font-medium">{label}</label>
            {children}
            <FormError error={error} />
          </div>
        );
      }

  api_error_toast:
    description: "API error toast"
    code: |
      // API error interceptor
      apiClient.interceptors.response.use(
        (response) => response,
        (error) => {
          const message = error.response?.data?.detail || 'İşlem başarısız';
          
          toast.error(message, {
            action: error.config && {
              label: 'Tekrar Dene',
              onClick: () => apiClient.request(error.config),
            },
          });
          
          return Promise.reject(error);
        }
      );

  empty_state:
    description: "Empty state component"
    code: |
      interface EmptyStateProps {
        icon?: React.ReactNode;
        title: string;
        description?: string;
        action?: {
          label: string;
          onClick: () => void;
        };
      }

      export function EmptyState({ icon, title, description, action }: EmptyStateProps) {
        return (
          <div className="flex flex-col items-center justify-center py-12 text-center">
            {icon || <Inbox className="w-12 h-12 text-gray-400 mb-4" />}
            <h3 className="text-lg font-medium text-gray-900">{title}</h3>
            {description && <p className="text-gray-500 mt-1">{description}</p>}
            {action && (
              <Button className="mt-4" onClick={action.onClick}>
                {action.label}
              </Button>
            )}
          </div>
        );
      }

# ════════════════════════════════════════════════════════════════════════════
