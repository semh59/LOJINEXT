# ════════════════════════════════════════════════════════════════════════════
# SKILL: pytest Fixtures
# ════════════════════════════════════════════════════════════════════════════

name: "pytest Fixtures"
version: "1.0"
agent: "qa"

trigger_keywords:
  - "fixture"
  - "test data"
  - "factory"
  - "setup"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  conftest:
    description: "conftest.py setup"
    code: |
      # tests/conftest.py
      import pytest
      import asyncio
      from httpx import AsyncClient
      from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
      from app.database.models import Base
      from app.main import app
      from app.core.container import container

      @pytest.fixture(scope="session")
      def event_loop():
          loop = asyncio.get_event_loop_policy().new_event_loop()
          yield loop
          loop.close()

      @pytest.fixture(scope="function")
      async def db_session():
          engine = create_async_engine("sqlite+aiosqlite:///:memory:")
          async with engine.begin() as conn:
              await conn.run_sync(Base.metadata.create_all)
          
          async with AsyncSession(engine) as session:
              yield session
          
          await engine.dispose()

      @pytest.fixture
      async def client(db_session):
          container.db_session.override(lambda: db_session)
          async with AsyncClient(app=app, base_url="http://test") as ac:
              yield ac
          container.reset_override()

  factory_pattern:
    description: "Test data factory"
    code: |
      # tests/factories.py
      import factory
      from app.database.models import Driver, Vehicle, Trip

      class DriverFactory(factory.Factory):
          class Meta:
              model = Driver
          
          id = factory.Sequence(lambda n: n + 1)
          ad = factory.Faker('first_name', locale='tr_TR')
          soyad = factory.Faker('last_name', locale='tr_TR')
          telefon = factory.Sequence(lambda n: f"0532{n:07d}")
          is_active = True

      class VehicleFactory(factory.Factory):
          class Meta:
              model = Vehicle
          
          id = factory.Sequence(lambda n: n + 1)
          plaka = factory.Sequence(lambda n: f"34 AB {n:04d}")
          marka = factory.Faker('random_element', elements=['Mercedes', 'Volvo', 'MAN'])
          is_active = True

  fixture_with_db:
    description: "DB record fixtures"
    code: |
      @pytest.fixture
      async def driver(db_session) -> Driver:
          driver = DriverFactory.build()
          db_session.add(driver)
          await db_session.commit()
          await db_session.refresh(driver)
          return driver

      @pytest.fixture
      async def drivers(db_session) -> list[Driver]:
          items = [DriverFactory.build() for _ in range(5)]
          db_session.add_all(items)
          await db_session.commit()
          return items

  auth_fixtures:
    description: "Authentication fixtures"
    code: |
      @pytest.fixture
      async def auth_token(client, user) -> str:
          response = await client.post("/auth/login", json={
              "email": user.email,
              "password": "testpass123"
          })
          return response.json()["access_token"]

      @pytest.fixture
      def auth_headers(auth_token) -> dict:
          return {"Authorization": f"Bearer {auth_token}"}

  parametrized_fixtures:
    description: "Parametrized fixtures"
    code: |
      @pytest.fixture(params=[
          {"status": "active", "count": 3},
          {"status": "inactive", "count": 2},
      ])
      async def drivers_by_status(request, db_session):
          items = [
              DriverFactory.build(is_active=(request.param["status"] == "active"))
              for _ in range(request.param["count"])
          ]
          db_session.add_all(items)
          await db_session.commit()
          return items

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Fixtures conftest.py'de merkezi"
  - "Factory pattern ile dinamik data"
  - "Scope doğru seç (function, module, session)"
  - "Cleanup için yield kullan"
  - "Auth fixtures reusable olsun"
