name: "API Testing"
version: "1.0"
agent: "qa"

trigger_keywords:
  - "api test"
  - "endpoint test"
  - "integration test"
  - "http test"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  crud_tests:
    description: "CRUD endpoint tests"
    code: |
      class TestDriverCRUD:
          """Driver CRUD endpoint testleri"""
          
          @pytest.mark.asyncio
          async def test_list_drivers(self, client, auth_headers, drivers):
              response = await client.get("/suruculer", headers=auth_headers)
              assert response.status_code == 200
              data = response.json()
              assert len(data) == len(drivers)
          
          @pytest.mark.asyncio
          async def test_get_driver(self, client, auth_headers, driver):
              response = await client.get(f"/suruculer/{driver.id}", headers=auth_headers)
              assert response.status_code == 200
              data = response.json()
              assert data["id"] == driver.id
              assert data["ad"] == driver.ad
          
          @pytest.mark.asyncio
          async def test_create_driver(self, client, auth_headers):
              payload = {"ad": "Test", "soyad": "User", "telefon": "05321234567"}
              response = await client.post("/suruculer", json=payload, headers=auth_headers)
              assert response.status_code == 201
              data = response.json()
              assert data["ad"] == "Test"
              assert "id" in data
          
          @pytest.mark.asyncio
          async def test_update_driver(self, client, auth_headers, driver):
              payload = {"ad": "Updated"}
              response = await client.put(
                  f"/suruculer/{driver.id}", 
                  json=payload, 
                  headers=auth_headers
              )
              assert response.status_code == 200
              assert response.json()["ad"] == "Updated"
          
          @pytest.mark.asyncio
          async def test_delete_driver(self, client, auth_headers, driver):
              response = await client.delete(f"/suruculer/{driver.id}", headers=auth_headers)
              assert response.status_code == 204

  error_tests:
    description: "Error case tests"
    code: |
      class TestDriverErrors:
          @pytest.mark.asyncio
          async def test_get_nonexistent_returns_404(self, client, auth_headers):
              response = await client.get("/suruculer/99999", headers=auth_headers)
              assert response.status_code == 404
              assert "bulunamadı" in response.json()["detail"]
          
          @pytest.mark.asyncio
          async def test_create_invalid_returns_422(self, client, auth_headers):
              payload = {"ad": ""}  # Empty name should fail
              response = await client.post("/suruculer", json=payload, headers=auth_headers)
              assert response.status_code == 422
          
          @pytest.mark.asyncio
          async def test_unauthorized_returns_401(self, client):
              response = await client.get("/suruculer")  # No auth header
              assert response.status_code == 401

  validation_tests:
    description: "Input validation tests"
    code: |
      class TestDriverValidation:
          @pytest.mark.asyncio
          @pytest.mark.parametrize("payload,expected_status", [
              ({"ad": "", "soyad": "Test"}, 422),           # Empty name
              ({"ad": "A" * 200, "soyad": "Test"}, 422),    # Too long
              ({"ad": "Test", "telefon": "invalid"}, 422),  # Invalid phone
              ({"ad": "Test", "soyad": "User", "telefon": "05321234567"}, 201),  # Valid
          ])
          async def test_create_validation(self, client, auth_headers, payload, expected_status):
              response = await client.post("/suruculer", json=payload, headers=auth_headers)
              assert response.status_code == expected_status

  pagination_tests:
    description: "Pagination tests"
    code: |
      class TestDriverPagination:
          @pytest.mark.asyncio
          async def test_pagination_default(self, client, auth_headers, many_drivers):
              response = await client.get("/suruculer", headers=auth_headers)
              data = response.json()
              assert len(data["items"]) <= 20  # Default page size
          
          @pytest.mark.asyncio
          async def test_pagination_custom(self, client, auth_headers, many_drivers):
              response = await client.get(
                  "/suruculer?page=1&page_size=5", 
                  headers=auth_headers
              )
              data = response.json()
              assert len(data["items"]) == 5
              assert data["total"] == len(many_drivers)

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Her endpoint için CRUD testleri"
  - "Error cases: 404, 401, 422"
  - "Parametrized validation tests"
  - "Pagination edge cases"
  - "Concurrent access tests"
