# SKILL: Mock Strategies
# ════════════════════════════════════════════════════════════════════════════

name: "Mock Strategies"
version: "1.0"
agent: "qa"

trigger_keywords:
  - "mock"
  - "stub"
  - "fake"
  - "test double"

# ════════════════════════════════════════════════════════════════════════════
patterns:
  basic_mock:
    description: "Temel mock kullanımı"
    code: |
      from unittest.mock import Mock, patch, AsyncMock

      def test_with_mock():
          mock_repo = Mock()
          mock_repo.get_by_id.return_value = Driver(id=1, ad="Test")
          
          service = DriverService(repo=mock_repo)
          result = service.get_driver(1)
          
          assert result.ad == "Test"
          mock_repo.get_by_id.assert_called_once_with(1)

  async_mock:
    description: "Async mock"
    code: |
      @pytest.mark.asyncio
      async def test_async_service():
          mock_repo = AsyncMock()
          mock_repo.get_by_id.return_value = Driver(id=1, ad="Test")
          
          service = DriverService(repo=mock_repo)
          result = await service.get_driver(1)
          
          assert result.ad == "Test"

  patch_decorator:
    description: "Patch decorator"
    code: |
      @patch('app.services.weather_service.httpx.AsyncClient')
      @pytest.mark.asyncio
      async def test_weather_service(mock_client):
          mock_response = Mock()
          mock_response.json.return_value = {"temp": 25}
          mock_client.return_value.__aenter__.return_value.get = AsyncMock(
              return_value=mock_response
          )
          
          result = await get_weather("Istanbul")
          assert result["temp"] == 25

  mock_external_api:
    description: "External API mocking"
    code: |
      import httpx
      from pytest_httpx import HTTPXMock

      @pytest.mark.asyncio
      async def test_openroute_service(httpx_mock: HTTPXMock):
          httpx_mock.add_response(
              url="https://api.openrouteservice.org/v2/directions",
              json={"routes": [{"distance": 12345}]}
          )
          
          result = await openroute_service.get_route(coords)
          assert result["distance"] == 12345

  mock_redis:
    description: "Redis mocking"
    code: |
      import fakeredis.aioredis

      @pytest.fixture
      async def redis_client():
          return fakeredis.aioredis.FakeRedis()

      @pytest.mark.asyncio
      async def test_cache_service(redis_client):
          service = CacheService(redis=redis_client)
          await service.set("key", "value")
          result = await service.get("key")
          assert result == "value"

  mock_datetime:
    description: "Datetime mocking"
    code: |
      from freezegun import freeze_time

      @freeze_time("2024-01-15 10:00:00")
      def test_date_based_logic():
          result = get_current_quarter()
          assert result == "Q1-2024"

      @freeze_time("2024-12-31 23:59:59")
      def test_year_end():
          result = calculate_yearly_stats()
          # ...

  side_effect:
    description: "Side effects ve exceptions"
    code: |
      mock_repo = AsyncMock()

      # Exception fırlat
      mock_repo.get_by_id.side_effect = DatabaseError("Connection failed")

      # Ardışık return değerleri
      mock_repo.get_all.side_effect = [
          [driver1, driver2],  # First call
          [],                   # Second call
      ]

      # Custom fonksiyon
      mock_repo.create.side_effect = lambda d: Driver(id=99, **d)

# ════════════════════════════════════════════════════════════════════════════
when_to_mock:
  always_mock:
    - "External APIs (weather, maps, payment)"
    - "Time/date"
    - "Email/SMS services"
    - "File system (production writes)"

  consider_mocking:
    - "Database (unit tests: yes, integration: no)"
    - "Redis/cache"

  rarely_mock:
    - "Business logic"
    - "Pure functions"

# ════════════════════════════════════════════════════════════════════════════
best_practices:
  - "Mock external dependencies, not internal logic"
  - "Verify mock was called as expected"
  - "Reset mocks between tests"
  - "Use fixture for common mocks"
  - "Real DB for integration tests"
